<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>READY PLAY! - 글쓰기</title>

    <!-- Quill 리치텍스트 에디터 -->
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="env.js"></script>
    <script src="common.js"></script>
    <link rel="stylesheet" href="common.css">
    <style>
        body { font-family: 'Arial Black', sans-serif; background: #f0f0f0; margin: 0; }

        .page-wrap {
            max-width: 860px;
            margin: 60px auto;
            padding: 0 20px 100px;
        }

        /* ── 글쓰기 카드 ── */
        .write-card {
            background: #fff;
            border: 4px solid #000;
            box-shadow: 12px 12px 0 #000;
        }
        .write-card-header {
            background: #000; color: #fff;
            padding: 22px 30px;
            font-size: 24px; font-weight: 900;
            text-transform: uppercase; letter-spacing: -0.5px;
        }
        .write-card-body { padding: 30px; }

        /* ── 폼 행 ── */
        .form-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .form-label {
            width: 80px;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            flex-shrink: 0;
        }
        .form-label.required::after {
            content: ' *';
            color: #FF5A10;
        }
        .form-input {
            flex: 1;
            height: 44px;
            padding: 0 14px;
            border: 3px solid #000;
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            outline: none;
            box-sizing: border-box;
        }
        .form-input:focus { background: #fffef0; border-color: #000; }

        /* 말머리 select */
        .category-select {
            height: 44px;
            padding: 0 12px;
            border: 3px solid #000;
            font-size: 13px;
            font-weight: 900;
            font-family: inherit;
            background: #fff;
            cursor: pointer;
            outline: none;
            box-shadow: 3px 3px 0 #000;
        }

        /* ── 비밀글 토글 ── */
        .secret-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }
        .secret-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
            font-size: 13px;
            font-weight: 900;
        }
        .secret-toggle input[type="checkbox"] {
            width: 18px; height: 18px;
            accent-color: #000;
            cursor: pointer;
        }
        .secret-pw-wrap {
            display: none;
            flex: 1;
        }
        .secret-pw-wrap.show { display: block; }

        /* ── Quill 에디터 스타일 ── */
        .editor-wrap { margin-bottom: 20px; }
        .editor-label {
            font-size: 12px; font-weight: 900;
            text-transform: uppercase; margin-bottom: 8px;
            letter-spacing: 0.05em;
        }
        .editor-label .required { color: #FF5A10; }
        #editor {
            height: 320px;
            border: 3px solid #000 !important;
            border-top: none !important;
            font-size: 15px;
            font-family: sans-serif;
        }
        .ql-toolbar.ql-snow {
            border: 3px solid #000 !important;
            background: #f5f5f5;
        }
        .ql-container.ql-snow { border: 3px solid #000 !important; border-top: none !important; }

        /* ── 파일 첨부 ── */
        .attach-section { margin-bottom: 24px; }
        .attach-label {
            font-size: 12px; font-weight: 900;
            text-transform: uppercase; margin-bottom: 10px;
            letter-spacing: 0.05em;
        }
        .attach-box {
            border: 3px dashed #000;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            background: #fafafa;
            transition: background 0.2s;
        }
        .attach-box:hover { background: #fffef0; }
        .attach-box input { display: none; }
        .attach-hint { font-size: 12px; color: #888; margin-top: 6px; font-family: sans-serif; }
        .attach-list { margin-top: 12px; }
        .attach-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border: 2px solid #000;
            margin-bottom: 6px;
            font-size: 13px;
            background: #fff;
        }
        .attach-remove {
            cursor: pointer; color: #f00;
            font-weight: 900; font-size: 16px;
            background: none; border: none;
            font-family: inherit;
        }

        /* ── 버튼 그룹 ── */
        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            padding-top: 16px;
            border-top: 3px solid #000;
        }
        .btn-submit {
            padding: 14px 36px;
            background: #000; color: #fff;
            border: 3px solid #000;
            font-weight: 900; font-size: 15px;
            cursor: pointer; font-family: inherit;
            box-shadow: 4px 4px 0 #555;
            transition: 0.1s; text-transform: uppercase;
        }
        .btn-submit:hover  { background: #D4ED00; color: #000; }
        .btn-submit:active { transform: translate(3px,3px); box-shadow: none; }
        .btn-cancel {
            padding: 14px 28px;
            background: #fff;
            border: 3px solid #000;
            font-weight: 900; font-size: 15px;
            cursor: pointer; font-family: inherit;
            box-shadow: 4px 4px 0 #000;
            transition: 0.1s; text-transform: uppercase;
        }
        .btn-cancel:hover  { background: #eee; }
        .btn-cancel:active { transform: translate(3px,3px); box-shadow: none; }
    </style>
</head>
<body>

<div id="header-container"></div>

<div class="page-wrap">
    <div class="write-card">
        <div class="write-card-header">✏ 새 글 작성</div>
        <div class="write-card-body">

            <!-- 말머리 + 제목 -->
            <div class="form-row">
                <span class="form-label required">말머리</span>
                <select class="category-select" id="postCategory">
                    <option value="자유">💬 자유</option>
                    <option value="축구">⚽ 축구</option>
                    <option value="야구">⚾ 야구</option>
                    <option value="농구">🏀 농구</option>
                    <option value="배구">🏐 배구</option>
                    <option value="러닝">🏃 러닝</option>
                    <option value="헬스">💪 헬스</option>
                    <option value="리뷰">⭐ 리뷰</option>
                    <option value="질문">❓ 질문</option>
                    <option value="공지">📢 공지</option>
                </select>
            </div>
            <div class="form-row">
                <span class="form-label required">제목</span>
                <input type="text" class="form-input" id="postTitle" placeholder="제목을 입력하세요" maxlength="100">
            </div>

            <!-- 비밀글 -->
            <div class="secret-row">
                <span class="form-label">비밀글</span>
                <label class="secret-toggle">
                    <input type="checkbox" id="secretCheck" onchange="toggleSecret(this)">
                    <span>비밀글로 설정</span>
                </label>
                <div class="secret-pw-wrap" id="secretPwWrap">
                    <input type="password" class="form-input" id="secretPw"
                           placeholder="비밀번호 입력 (비밀글 열람 시 필요)" style="width:280px; height:38px;">
                </div>
            </div>

            <!-- 내용 (Quill 에디터) -->
            <div class="editor-wrap">
                <div class="editor-label">내용 <span class="required">*</span></div>
                <div id="editor"></div>
            </div>

            <!-- 파일 첨부 -->
            <div class="attach-section">
                <div class="attach-label">파일 첨부 <span style="color:#888; font-size:11px; font-weight:700;">(최대 3개, 파일당 5MB)</span></div>
                <div class="attach-box" onclick="document.getElementById('fileInput').click()">
                    📎 클릭하여 파일 선택 또는 여기에 드래그 앤 드롭
                    <div class="attach-hint">이미지, PDF, 문서 파일 등</div>
                    <input type="file" id="fileInput" multiple accept="*/*" onchange="addFiles(this.files)">
                </div>
                <div class="attach-list" id="attachList"></div>
            </div>

            <!-- 버튼 -->
            <div class="btn-row">
                <button class="btn-cancel" onclick="history.back()">취소</button>
                <button class="btn-submit" id="submitBtn" onclick="submitPost()">게시하기 →</button>
            </div>

        </div>
    </div>
</div>

<div id="footer-container"></div>

<script>
    const sb = getSupabase();
    let selectedFiles = [];

    // ────────────────────────────────────────────────────────
    //  Quill 에디터 초기화
    // ────────────────────────────────────────────────────────
    const quill = new Quill('#editor', {
        theme: 'snow',
        placeholder: '내용을 입력하세요...',
        modules: {
            toolbar: [
                [{ header: [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ color: [] }, { background: [] }],
                [{ list: 'ordered' }, { list: 'bullet' }],
                ['link', 'image'],
                ['clean']
            ]
        }
    });

    // ────────────────────────────────────────────────────────
    //  초기화: 로그인 체크
    // ────────────────────────────────────────────────────────
    const isNoticeBoard = new URLSearchParams(window.location.search).get('board') === 'notice';

    document.addEventListener('DOMContentLoaded', async () => {
        await loadLayout();
        const user = JSON.parse(sessionStorage.getItem('readyplayUser') || '{}');
        if (!user.isLoggedIn) {
            alert('로그인 후 글을 쓸 수 있습니다.');
            location.href = 'login.html';
            return;
        }

        if (isNoticeBoard) {
            if (user.userRole !== 'admin') {
                alert('공지 게시판은 관리자만 작성할 수 있습니다.');
                location.href = 'notice.html';
                return;
            }
            const sel = document.getElementById('postCategory');
            sel.value = '공지';
            sel.disabled = true;
            sel.style.opacity = '0.6';
            document.querySelector('.write-card-header').textContent = '📢 공지 작성';
            // 공지글에는 비밀글 개념이 없으므로 옵션 자체를 숨긴다
            document.querySelector('.secret-row').style.display = 'none';
        }
    });

    // ────────────────────────────────────────────────────────
    //  비밀글 토글
    // ────────────────────────────────────────────────────────
    function toggleSecret(checkbox) {
        const wrap = document.getElementById('secretPwWrap');
        if (checkbox.checked) {
            wrap.classList.add('show');
            document.getElementById('secretPw').focus();
        } else {
            wrap.classList.remove('show');
            document.getElementById('secretPw').value = '';
        }
    }

    // ────────────────────────────────────────────────────────
    //  파일 첨부 처리
    // ────────────────────────────────────────────────────────
    function addFiles(files) {
        if (selectedFiles.length + files.length > 3) {
            alert('파일은 최대 3개까지 첨부할 수 있습니다.');
            return;
        }
        for (const file of files) {
            if (file.size > 5 * 1024 * 1024) {
                alert(`"${file.name}"의 크기가 5MB를 초과합니다.`);
                continue;
            }
            if (!selectedFiles.find(f => f.name === file.name)) {
                selectedFiles.push(file);
            }
        }
        renderAttachList();
        // input.value를 비워야 같은 파일을 다시 선택했을 때도 onchange가 재발생한다
        document.getElementById('fileInput').value = '';
    }

    function removeFile(idx) {
        selectedFiles.splice(idx, 1);
        renderAttachList();
    }

    function renderAttachList() {
        const list = document.getElementById('attachList');
        list.innerHTML = selectedFiles.map((f, i) => `
            <div class="attach-item">
                <span>📄 ${f.name} <span style="color:#aaa; font-size:11px;">(${(f.size/1024).toFixed(1)}KB)</span></span>
                <button class="attach-remove" onclick="removeFile(${i})">✕</button>
            </div>
        `).join('');
    }

    // 드래그 앤 드롭
    const attachBox = document.querySelector('.attach-box');
    attachBox.addEventListener('dragover', e => { e.preventDefault(); attachBox.style.background = '#fffef0'; });
    attachBox.addEventListener('dragleave', () => { attachBox.style.background = '#fafafa'; });
    attachBox.addEventListener('drop', e => {
        e.preventDefault();
        attachBox.style.background = '#fafafa';
        addFiles(e.dataTransfer.files);
    });

    // ────────────────────────────────────────────────────────
    //  게시글 제출
    // ────────────────────────────────────────────────────────
    async function submitPost() {
        const title    = document.getElementById('postTitle').value.trim();
        const category = document.getElementById('postCategory').value;
        const isSecret = document.getElementById('secretCheck').checked;
        const secretPw = document.getElementById('secretPw').value.trim();
        const content  = quill.root.innerHTML.trim();

        if (!title) { alert('제목을 입력해주세요.'); document.getElementById('postTitle').focus(); return; }
        if (content === '<p><br></p>' || !content) { alert('내용을 입력해주세요.'); quill.focus(); return; }
        if (isSecret && !secretPw) { alert('비밀글 비밀번호를 입력해주세요.'); document.getElementById('secretPw').focus(); return; }

        const btn = document.getElementById('submitBtn');
        btn.disabled   = true;
        btn.textContent = '저장 중...';

        try {
            const { data: { session } } = await sb.auth.getSession();
            const user = JSON.parse(sessionStorage.getItem('readyplayUser') || '{}');

            const { data: post, error: postError } = await sb.from('posts').insert([{
                user_id:         session?.user?.id || null,
                author_name:     user.userName || '익명',
                title,
                content,
                category,
                is_secret:       isSecret,
                secret_password: isSecret ? secretPw : null
            }]).select().single();

            if (postError) throw postError;

            if (selectedFiles.length > 0) {
                for (const file of selectedFiles) {
                    const path = `posts/${post.id}/${Date.now()}-${file.name}`;
                    const { data: uploadData, error: uploadError } = await sb.storage
                        .from('post-files')
                        .upload(path, file);

                    if (uploadError) {
                        // 게시글은 이미 저장됐으므로 첨부파일 하나가 실패해도 롤백하지 않고
                        // 경고만 남긴 뒤 나머지 파일 업로드를 계속 진행한다
                        console.warn('파일 업로드 실패:', uploadError.message);
                        continue;
                    }

                    const { data: urlData } = sb.storage.from('post-files').getPublicUrl(uploadData.path);

                    await sb.from('post_attachments').insert([{
                        post_id:   post.id,
                        file_name: file.name,
                        file_url:  urlData.publicUrl,
                        file_size: file.size
                    }]);
                }
            }

            alert('✅ 게시글이 등록됐습니다!');
            location.href = `post-detail.html?id=${post.id}${isNoticeBoard ? '&from=notice' : ''}`;

        } catch (err) {
            alert('❌ 오류: ' + err.message);
            btn.disabled    = false;
            btn.textContent = '게시하기 →';
        }
    }
</script>
</body>
</html>
