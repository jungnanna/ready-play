<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Cart Component</title>
    <style>
        /* 폰트 및 기본 설정 */
        body { margin: 0; font-family: 'Arial Black', sans-serif; }

        /* --- 미니 장바구니 사이드바 (화면의 1/3 너비) --- */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: 0; /* 여기서는 바로 보이게 설정 (나중에 -400px 등으로 숨김 가능) */
            width: 380px; 
            height: 100vh;
            background: #fff;
            border-left: 4px solid #000;
            display: flex;
            flex-direction: column;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: -10px 0 30px rgba(0,0,0,0.05);
        }

        /* 헤더 부분 */
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .cart-title { font-size: 28px; font-weight: 900; }
        .close-btn { font-size: 30px; cursor: pointer; font-weight: 900; }

        /* 상단 컨트롤 바 */
        .cart-top-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 2px solid #000;
            font-size: 14px;
            font-weight: 800;
        }

        /* 상품 리스트 영역 */
        .cart-items-container {
            flex: 1;
            overflow-y: auto;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
        }

        /* 상품이 없을 때 보이는 메시지 */
        .empty-msg {
            text-align: center;
            padding: 100px 0;
            color: #ccc;
            font-size: 16px;
            font-weight: 800;
        }

        /* 상품 아이템 스타일 (스크립트로 추가될 때 적용) */
        .item { display: flex; gap: 15px; margin-bottom: 25px; position: relative; }
        .item-chk { width: 20px; height: 20px; cursor: pointer; border: 2px solid #000; }
        .item-img { width: 80px; height: 100px; background: #eee; border-radius: 4px; object-fit: cover; }
        .item-info { flex: 1; }
        .item-name { font-size: 13px; font-weight: 800; line-height: 1.3; margin-bottom: 5px; font-family: sans-serif; }
        .item-price { font-size: 16px; font-weight: 900; margin-bottom: 10px; }
        .qty-box { display: flex; align-items: center; gap: 12px; }
        .qty-btn { background: none; border: none; font-size: 20px; font-weight: 900; cursor: pointer; }
        .item-del { position: absolute; right: 0; top: 0; cursor: pointer; font-size: 22px; font-weight: 900; }

        /* 하단 결제 정보 */
        .cart-footer {
            border-top: 1px solid #eee;
            padding-top: 15px;
            margin-top: 10px;
        }
        .sum-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 15px;
            font-weight: 800;
        }
        .sum-row.total {
            font-size: 22px;
            font-weight: 900;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        /* 하단 버튼 그룹 */
        .btn-group {
            display: flex;
            gap: 8px;
            margin-top: 25px;
        }
        .btn {
            flex: 1;
            padding: 18px;
            text-align: center;
            font-weight: 900;
            font-size: 15px;
            border: 3px solid #000;
            cursor: pointer;
            transition: 0.1s;
        }
        .btn-black { background: #000; color: #fff; }
        .btn-white { background: #fff; color: #000; }
        .btn:active { transform: scale(0.98); }

    </style>
</head>
<body>

    <div class="cart-sidebar">
        <div class="cart-header">
            <div class="cart-title">Cart</div>
            <div class="close-btn">×</div>
        </div>

        <div class="cart-top-bar">
            <span><input type="checkbox" id="masterChk" onchange="toggleAll(this)"> 전체 선택</span>
            <span style="cursor: pointer; text-decoration: underline;" onclick="deleteChecked()">선택삭제</span>
        </div>

        <div class="cart-items-container" id="cartItems">
            <div class="empty-msg">장바구니에 담긴 상품이 없습니다.</div>
        </div>

        <div class="cart-footer">
            <div class="sum-row">
                <span>주문금액</span>
                <span id="orderAmt">0원</span>
            </div>
            <div class="sum-row">
                <span>배송비</span>
                <span id="shipAmt">0원</span>
            </div>
            <!-- disAmt: updateTotal()에서 참조 — 없으면 오류 발생 -->
            <div class="sum-row" style="color:#666;">
                <span>할인</span>
                <span id="disAmt">0원</span>
            </div>
            <div class="sum-row total">
                <span>결제예정금액</span>
                <span id="totalAmt">0원</span>
            </div>

            <div class="btn-group">
             <div class="btn btn-white" onclick="location.href='cart.html'" style="cursor:pointer;">장바구니</div>
            <div class="btn btn-black" onclick="alert('주문 페이지로 이동합니다.')">바로 주문하기</div>
        </div>
        </div>
    </div>

    <script>
        // cart.html / kit-detail.html 등 실제 페이지와 동일한 'Cart' 키를 사용한다
        let cart = JSON.parse(sessionStorage.getItem('Cart')) || [];

        function saveAndRender() {
            sessionStorage.setItem('Cart', JSON.stringify(cart));
            renderCart();
        }

        // 실제 상품 데이터 연동 전 테스트용으로 더미 아이템을 하나 추가하는 함수
        function addItem() {
            const container = document.getElementById('cartItems');
            const emptyMsg = container.querySelector('.empty-msg');
            if(emptyMsg) emptyMsg.remove();

            const newItem = document.createElement('div');
            newItem.className = 'item';
            newItem.setAttribute('data-price', '2000');
            newItem.innerHTML = `
                <input type="checkbox" class="item-chk" checked onchange="updateTotal()">
                <div class="item-img" style="background: #7B61FF;"></div>
                <div class="item-info">
                    <div class="item-name">새로운 테스트 상품<br>(Ready Play Item)</div>
                    <div class="item-price">2,000원</div>
                    <div class="qty-box">
                        <button class="qty-btn" onclick="changeQty(this, -1)">-</button>
                        <span class="qty-num">1</span>
                        <button class="qty-btn" onclick="changeQty(this, 1)">+</button>
                    </div>
                </div>
                <div class="item-del" onclick="this.closest('.item').remove(); updateTotal();">×</div>
            `;
            container.appendChild(newItem);
            updateTotal();
        }

        function changeQty(btn, delta) {
            const span = btn.parentElement.querySelector('.qty-num');
            let qty = parseInt(span.innerText) + delta;
            if(qty < 1) return;
            span.innerText = qty;
            updateTotal();
        }

        function deleteChecked() {
            document.querySelectorAll('.item-chk:checked').forEach(chk => chk.closest('.item').remove());
            updateTotal();
        }

        function toggleAll(master) {
            document.querySelectorAll('.item-chk').forEach(chk => chk.checked = master.checked);
            updateTotal();
        }

        function updateTotal() {
            const items = document.querySelectorAll('.item');
            const container = document.getElementById('cartItems');
            
            if(items.length === 0) {
                container.innerHTML = '<div class="empty-msg">장바구니에 담긴 상품이 없습니다.</div>';
                document.getElementById('orderAmt').innerText = "0원";
                document.getElementById('shipAmt').innerText = "0원";
                document.getElementById('disAmt').innerText = "0원";
                document.getElementById('totalAmt').innerText = "0원";
                return;
            }

            let sum = 0;
            items.forEach(item => {
                if(item.querySelector('.item-chk').checked) {
                    const price = parseInt(item.getAttribute('data-price'));
                    const qty = parseInt(item.querySelector('.qty-num').innerText);
                    sum += (price * qty);
                }
            });

            const shipping = sum > 0 ? 3000 : 0;
            const discount = Math.floor(sum * 0.05);

            document.getElementById('orderAmt').innerText = sum.toLocaleString() + "원";
            document.getElementById('shipAmt').innerText = shipping.toLocaleString() + "원";
            document.getElementById('disAmt').innerText = "-" + discount.toLocaleString() + "원";
            document.getElementById('totalAmt').innerText = (sum + shipping - discount).toLocaleString() + "원";
        }
    </script>
</body>
</html>
