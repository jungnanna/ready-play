<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>READY PLAY - 비밀번호 재설정</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="env.js"></script>
    <script src="common.js"></script>
    <link rel="stylesheet" href="common.css">
    <style>
        body { margin: 0; background: #f0f0f0; font-family: 'Arial Black', sans-serif; padding-top: 100px; }
        .main-wrapper {
            display: flex; justify-content: center; align-items: center;
            min-height: calc(100vh - 150px); padding: 50px 20px; box-sizing: border-box;
        }
        .box {
            width: 100%; max-width: 420px;
            background: #fff;
            border: 5px solid #000;
            box-shadow: 15px 15px 0 #000;
            padding: 50px 40px;
            box-sizing: border-box;
            text-align: center;
        }
        .box-title { font-size: 36px; font-weight: 900; text-transform: uppercase; margin: 0 0 10px; line-height: 1; }
        .box-sub   { font-size: 14px; color: #666; margin-bottom: 32px; line-height: 1.6; }

        .input-field {
            width: 100%; height: 60px; margin-bottom: 14px;
            padding: 0 15px; font-size: 17px; font-weight: 700;
            border: 4px solid #000; box-sizing: border-box; outline: none;
        }
        .input-field:focus { background: #000; color: #fff; }
        .pw-hint { font-size: 12px; color: #888; text-align: left; margin: -6px 0 16px; }

        .submit-btn {
            width: 100%; height: 65px;
            font-size: 20px; font-weight: 900;
            border: 4px solid #000; cursor: pointer;
            background: #000; color: #fff;
            transition: 0.1s; font-family: inherit;
        }
        .submit-btn:hover  { background: #D4ED00; color: #000; border-color: #000; }
        .submit-btn:active { transform: translate(3px,3px); box-shadow: none; }

        .msg { margin-top: 18px; font-size: 14px; font-weight: 700; min-height: 20px; }
        .msg.success { color: #0a0; }
        .msg.error   { color: #f00; }

        /* 유효하지 않은 링크일 때 */
        .invalid-box { text-align: center; padding: 40px 20px; }
        .invalid-box .icon { font-size: 60px; margin-bottom: 16px; }
        .invalid-box p { font-family: sans-serif; color: #555; line-height: 1.7; }

        .go-login {
            display: inline-block; margin-top: 24px;
            padding: 12px 30px; font-weight: 900; font-size: 14px;
            border: 3px solid #000; background: #fff;
            box-shadow: 4px 4px 0 #000; cursor: pointer;
            text-decoration: none; color: #000;
            transition: 0.1s;
        }
        .go-login:hover { background: #000; color: #fff; }
    </style>
</head>
<body>

<div id="header-container"></div>

<div class="main-wrapper">
    <div class="box" id="mainBox">
        <!-- JS가 내용을 채웁니다 -->
        <div class="invalid-box">
            <div class="icon">⏳</div>
            <p>잠깐, 링크 확인 중입니다...</p>
        </div>
    </div>
</div>

<div id="footer-container"></div>

<script>
    const sb = getSupabase();

    document.addEventListener('DOMContentLoaded', async () => {
        loadLayout();
        await init();
    });

    /**
     * 비밀번호 재설정 이메일의 링크는 Supabase 설정에 따라 두 가지 형식으로 올 수 있다:
     *   ① ?code=xxx            (PKCE 방식, Supabase v2 기본)
     *   ② #access_token=xxx&type=recovery  (구 해시 방식)
     * 어느 쪽으로 왔는지 URL을 보고 판별해 각각 다른 방식으로 세션을 복구한다.
     */
    async function init() {
        const hash   = window.location.hash;
        const search = window.location.search;

        const hashParams = new URLSearchParams(hash.replace('#', ''));
        const type       = hashParams.get('type');
        const accessToken = hashParams.get('access_token');

        const codeParams = new URLSearchParams(search);
        const code       = codeParams.get('code');

        // ① code 방식 처리
        if (code) {
            try {
                const { error } = await sb.auth.exchangeCodeForSession(code);
                if (error) throw error;
                showForm();
            } catch {
                showInvalid();
            }
            return;
        }

        // ② access_token + type=recovery 방식 처리
        if (accessToken && type === 'recovery') {
            try {
                const { error } = await sb.auth.setSession({
                    access_token:  accessToken,
                    refresh_token: hashParams.get('refresh_token') || ''
                });
                if (error) throw error;
                showForm();
            } catch {
                showInvalid();
            }
            return;
        }

        // 토큰 없음 → 잘못된 접근
        showInvalid();
    }

    // ── 비밀번호 재설정 폼 표시 ──
    function showForm() {
        document.getElementById('mainBox').innerHTML = `
            <h1 class="box-title">NEW<br>PASSWORD</h1>
            <p class="box-sub">새로운 비밀번호를 입력해 주세요.</p>

            <input type="password" class="input-field" id="newPw"  placeholder="새 비밀번호">
            <p class="pw-hint">※ 영문+숫자 조합 8자 이상 권장</p>
            <input type="password" class="input-field" id="newPw2" placeholder="비밀번호 확인">

            <button class="submit-btn" id="submitBtn" onclick="doReset()">비밀번호 변경</button>
            <div class="msg" id="resetMsg"></div>
        `;
    }

    // ── 잘못된 링크 표시 ──
    function showInvalid() {
        document.getElementById('mainBox').innerHTML = `
            <div class="invalid-box">
                <div class="icon">⚠️</div>
                <h2 style="font-weight:900; margin:0 0 12px;">링크가 만료됐어요</h2>
                <p>
                    비밀번호 재설정 링크는 1시간 동안만 유효합니다.<br>
                    로그인 페이지에서 다시 요청해 주세요.
                </p>
                <a class="go-login" href="login.html">로그인 페이지로 →</a>
            </div>
        `;
    }

    // ── 비밀번호 실제 변경 ──
    async function doReset() {
        const pw   = document.getElementById('newPw').value;
        const pw2  = document.getElementById('newPw2').value;
        const msg  = document.getElementById('resetMsg');
        const btn  = document.getElementById('submitBtn');

        if (!pw || pw.length < 6) {
            msg.textContent = '❌ 비밀번호는 6자 이상이어야 합니다.';
            msg.className   = 'msg error'; return;
        }
        if (pw !== pw2) {
            msg.textContent = '❌ 비밀번호가 일치하지 않습니다.';
            msg.className   = 'msg error'; return;
        }

        btn.disabled    = true;
        btn.textContent = '변경 중...';
        msg.textContent = '';

        try {
            const { error } = await sb.auth.updateUser({ password: pw });
            if (error) throw error;

            msg.textContent = '✅ 비밀번호가 변경됐습니다! 로그인 페이지로 이동합니다.';
            msg.className   = 'msg success';
            btn.textContent = '변경 완료!';

            setTimeout(() => { location.href = 'login.html'; }, 2000);

        } catch (err) {
            msg.textContent = '❌ 오류: ' + err.message;
            msg.className   = 'msg error';
            btn.disabled    = false;
            btn.textContent = '비밀번호 변경';
        }
    }
</script>
</body>
</html>
