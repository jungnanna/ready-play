<!-- =====================================================
     header.html — Ready Play! 공통 헤더
     ⚠️ 이 파일은 순수 HTML만 작성합니다.
     JS 함수는 모두 common.js 에 있습니다.
     ===================================================== -->
<style>
/* 헤더 & 사이드바 전용 스타일
   (common.css의 :root 변수를 활용) */

/* --- 상단 고정 헤더 바 --- */
.top-header {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100px;
    display: flex;
    align-items: center;
    background: #fff;
    border-bottom: 4px solid #000;
    z-index: 999;
}

.menu {
    width: 80px;
    text-align: center;
    font-size: 28px;
    cursor: pointer;
    font-weight: 900;
}

.logo {
    flex: 1;
    text-align: left;
    font-size: 25px;
    font-weight: 900;
    cursor: pointer;
    letter-spacing: -1px;
    text-transform: uppercase;
}

.nav { display: flex; gap: 12px; padding-right: 20px; align-items: center; }

.nav-btn {
    padding: 6px 12px;
    border: 2px solid #000;
    background: #fff;
    cursor: pointer;
    color: #000;
    font-weight: 900;
    font-size: 14px;
    box-shadow: 3px 3px 0px #000;
    transition: 0.1s;
    font-family: 'Arial Black', sans-serif;
}
.nav-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px; }

/* --- 사이드바 (화면의 30%) --- */
.sidebar {
    position: fixed;
    top: 0; left: -30%;
    width: 30%;
    height: 100%;
    background: #fff;
    border-right: 4px solid #000;
    z-index: 1001;
    transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    padding: 30px;
    box-sizing: border-box;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}
.sidebar > * { flex-shrink: 0; }
.sidebar.active { left: 0; }

.close-btn { font-size: 35px; font-weight: 900; cursor: pointer; text-align: right; margin-bottom: 10px; }

.side-logo {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -1px;
    text-transform: uppercase;
    margin-bottom: 40px;
    border-bottom: 4px solid #000;
    padding-bottom: 10px;
    cursor: pointer;
}

.side-menu-item {
    font-size: 20px;
    font-weight: 900;
    margin: 15px 0;
    cursor: pointer;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* 사이드바 서브메뉴 */
.submenu {
    max-height: 0;
    overflow: hidden;
    list-style: none;
    padding-left: 15px;
    margin: 0;
    transition: max-height 0.3s ease-out;
    border-left: 3px solid #000;
    margin-left: 5px;
}
.submenu.open { max-height: 600px; margin-bottom: 15px; }
.submenu li { font-size: 15px; font-weight: 800; padding: 8px 0; cursor: pointer; color: #333; text-transform: lowercase; }
.submenu li:hover { color: #000; text-decoration: underline; }

/* 사이드바 하단 푸터 */
.side-footer { margin-top: auto; border-top: 4px solid #000; padding-top: 20px; }
.footer-item { font-size: 16px; font-weight: 900; margin: 12px 0; cursor: pointer; text-transform: uppercase; }

/* 오버레이 (사이드바 열렸을 때 배경 어둡게) */
.overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.7);
    display: none;
    z-index: 1000;
}
.overlay.active { display: block; }
</style>

<!-- 오버레이: 클릭하면 사이드바 닫힘 -->
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- 사이드바 -->
<div class="sidebar" id="sidebar">
    <div class="close-btn" onclick="toggleMenu()">×</div>
    <div class="side-logo" onclick="location.href='index.html'">Ready Play!</div>

    <div class="side-menu-item" onclick="location.href='about.html'">ABOUT US</div>

    <div class="side-menu-item" onclick="toggleSubmenu('storeSub')">STORE <span>+</span></div>
    <ul class="submenu" id="storeSub">
        <li onclick="location.href='soccer.html'">soccer</li>
        <li onclick="location.href='basketball.html'">basketball</li>
        <li onclick="location.href='baseball.html'">baseball</li>
        <li onclick="location.href='volleyball.html'">volleyball</li>
        <li onclick="location.href='running.html'">running</li>
        <li onclick="location.href='health.html'">health</li>
    </ul>

    <div class="side-menu-item" onclick="toggleSubmenu('commSub')">COMMUNITY <span>+</span></div>
    <ul class="submenu" id="commSub">
        <li onclick="location.href='notice.html'">📢 notice</li>
        <li onclick="location.href='review.html'">💬 community</li>
    </ul>

    <div class="side-footer">
        <!-- id="side-auth-btn" → common.js의 updateLoginStatus()가 텍스트/이벤트 변경 -->
        <div class="footer-item" id="side-auth-btn" onclick="location.href='login.html'">LOGIN</div>
        <div class="footer-item" onclick="checkLoginAndMove()">MY PAGE</div>
        <div class="footer-item" onclick="location.href='wishlist.html'">WISH</div>
        <div class="footer-item" onclick="location.href='cart.html'">CART</div>
    </div>
</div>

<!-- 상단 헤더 바 -->
<header class="top-header">
    <div class="menu" onclick="toggleMenu()">☰</div>
    <div class="logo" onclick="location.href='index.html'">Ready Play!</div>
    <div class="nav">
        <div class="nav-btn" onclick="location.href='about.html'">ABOUT</div>
        <div class="nav-btn" onclick="location.href='store.html'">STORE</div>
        <div class="nav-btn" onclick="location.href='review.html'">COMMUNITY</div>
        <!-- id="top-auth-btn" → common.js의 updateLoginStatus()가 LOGIN/LOGOUT 전환 -->
        <div class="nav-btn" id="top-auth-btn" onclick="location.href='login.html'">LOGIN</div>
        <div class="nav-btn" onclick="checkLoginAndMove()">MYPAGE</div>
        <div class="nav-btn" onclick="location.href='wishlist.html'">☆</div>
        <div class="nav-btn" onclick="location.href='cart.html'">CART</div>
    </div>
</header>
